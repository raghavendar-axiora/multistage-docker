name: Docker Python CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Build Docker image
      run: docker build -t flask-input-app .

    - name: Run container
      run: |
        # Forcefully remove any existing container with the name 'flask-app'
        docker rm -f flask-app || true
        
        # Start the new container
        docker run -d -p 5000:5000 --name flask-app flask-input-app

    - name: Wait for app
      run: |
        for i in {1..10}; do
          curl -s http://localhost:5000 && break
          sleep 2
        done

    - name: Run container
      run: |
        # Forcefully remove any existing container with the name 'flask-app'
        docker rm -f flask-app || true
        
        # Start the new container
        docker run -d -p 5000:5000 --name flask-app flask-input-app

    - name: Verify output
      run: |
        python3 -c '
        import urllib.request, time, sys
        for i in range(1, 11):
            try:
                with urllib.request.urlopen("http://localhost:5000") as response:
                    html = response.read().decode("utf-8").lower()
                    if "enter" in html:
                        print("Form detected")
                        sys.exit(0)
            except Exception as e:
                # This will print the exact connection error (e.g., Connection Refused)
                print(f"Attempt {i}: Server not ready or error: {e}")
            
            time.sleep(11)
        print("Error: Form not found after 10 attempts")
        sys.exit(1)
        '

    # THIS STEP WILL RUN ONLY IF THE PREVIOUS STEPS FAIL
    - name: Debug container logs on failure
      if: failure()
      run: |
        echo "=== Container Status ==="
        docker ps -a
        echo "=== Container Logs ==="
        docker logs flask-app
