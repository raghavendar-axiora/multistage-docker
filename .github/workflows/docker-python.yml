name: Docker Python CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Build Docker image
      run: docker build -t flask-input-app .

    - name: Run container
      run: docker run -d -p 5000:5000 --name flask-app flask-input-app

    - name: Wait for app
      run: |
        for i in {1..10}; do
          curl -s http://localhost:5000 && break
          sleep 2
        done

    - name: Verify output
      run: |
        python3 -c '
        import urllib.request, time, sys
        for i in range(1, 11):
            try:
                with urllib.request.urlopen("http://localhost:5000") as response:
                    html = response.read().decode("utf-8").lower()
                    if "enter" in html:
                        print("Form detected")
                        sys.exit(0)
            except Exception as e:
                print(f"Attempt {i}: Server not ready or error: {e}")
            
            print("Retrying in 11 seconds...")
            time.sleep(11)
        print("Error: Form not found after 10 attempts")
        sys.exit(1)
        '
        exit 1
