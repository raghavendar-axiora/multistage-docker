name: Docker Python CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Build Docker image
      run: docker build -t flask-input-app .

    - name: Run container
      run: docker run -d -p 5000:5000 --name flask-app flask-input-app

    - name: Wait for app
      run: |
        for i in {1..10}; do
          curl -s http://localhost:5000 && break
          sleep 2
        done

    - name: Verify output
      run: |
        for i in {1..10}; do
          # Safely fetch the response. '|| true' ensures that even if curl fails to connect, the script doesn't exit.
          response=$(curl -fs http://localhost:5000 || true)
          
          # Check if the word "Enter" is in the response (case-insensitive)
          if echo "$response" | grep -qi "Enter"; then
            echo "Form detected"
            exit 0
          fi
          
          echo "Attempt $i: Form not found yet, retrying in 11 seconds..."
          sleep 11
        done
        
        echo "Error: Form not found after 10 attempts"
        exit 1
